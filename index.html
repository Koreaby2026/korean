<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>한국어 · your dictionary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #1f1d1a;
    --muted: #7d756c;
    --accent: #c2410c;
    --accent-soft: #fde8d8;
    --green: #15803d;
    --green-soft: #dcfce7;
    --red: #b91c1c;
    --red-soft: #fee2e2;
    --border: #ece7df;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .hangul { font-family: 'Noto Sans KR', 'Inter', sans-serif; }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }
  h1 {
    font-size: 22px;
    margin: 0;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  h1 .kr { font-family: 'Noto Sans KR'; color: var(--accent); margin-right: 6px; }
  .stats {
    display: flex;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .stat-pill {
    background: var(--card);
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
  }
  .stat-pill .num { color: var(--ink); font-weight: 600; }
  .stat-pill.fire .num { color: var(--accent); }

  .controls {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .control-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .control-row:last-child { margin-bottom: 0; }
  .control-label {
    font-size: 12px;
    color: var(--muted);
    width: 100%;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .chip {
    background: transparent;
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
    color: var(--ink);
    font-family: inherit;
    transition: all 0.15s;
  }
  .chip:hover { background: var(--bg); }
  .chip.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .chip.fire.active { background: var(--accent); border-color: var(--accent); }
  select.chip {
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%237d756c' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 26px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: var(--shadow);
    min-height: 280px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }
  .question-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .question-meta .tag {
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .question-meta .tag.forgotten { color: var(--accent); background: var(--accent-soft); }
  .question {
    font-size: 44px;
    font-weight: 500;
    margin-bottom: 8px;
    line-height: 1.2;
    word-break: keep-all;
  }
  .question.kr-mode { font-family: 'Noto Sans KR', sans-serif; }
  .question-prompt {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .input-wrap {
    display: flex;
    gap: 8px;
    max-width: 420px;
    margin: 0 auto;
  }
  input[type="text"] {
    flex: 1;
    padding: 12px 16px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  .btn {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    background: var(--ink);
    color: #fff;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn.secondary {
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--border);
  }
  .btn.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .actions {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .feedback {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 12px;
    text-align: left;
  }
  .feedback.correct { background: var(--green-soft); color: var(--green); }
  .feedback.wrong { background: var(--red-soft); color: var(--red); }
  .feedback.skip { background: var(--bg); color: var(--muted); border: 1px dashed var(--border); }
  .feedback .answer-line { font-size: 18px; margin-bottom: 4px; }
  .feedback .answer-line .hangul { font-weight: 600; font-size: 22px; }
  .word-icon { font-size: 22px; vertical-align: middle; margin-right: 4px; }
  .word-icon-sm { font-size: 14px; margin-right: 2px; }
  .feedback .romaja { font-style: italic; font-size: 13px; opacity: 0.8; }
  .feedback .example { margin-top: 8px; font-size: 14px; opacity: 0.85; }

  .session-bar {
    margin-top: 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  .session-bar strong { color: var(--ink); }
  .session-bar .reset {
    background: none;
    border: none;
    color: var(--muted);
    text-decoration: underline;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    padding: 0;
    margin-left: 8px;
  }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; }

  .footer-actions {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
  }
  .footer-actions a, .footer-actions button {
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
    font-size: 12px;
    margin: 0 6px;
    padding: 0;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    box-shadow: var(--shadow);
  }
  .tab {
    flex: 1;
    background: transparent;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    background: var(--ink);
    color: #fff;
  }
  .view { display: none; }
  .view.active { display: block; }

  /* Sentences */
  .sentence-card .question {
    font-size: 22px;
    line-height: 1.5;
    font-weight: 400;
    margin-bottom: 12px;
    text-align: left;
    padding: 0 8px;
  }
  .sentence-card .question.kr-mode { font-size: 24px; }
  textarea#sentenceInput {
    width: 100%;
    min-height: 80px;
    padding: 12px 16px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    resize: vertical;
    line-height: 1.5;
  }
  textarea#sentenceInput:focus { border-color: var(--accent); }
  .sentence-feedback {
    margin-top: 16px;
    padding: 16px 20px;
    border-radius: 12px;
    text-align: left;
    background: var(--bg);
    border: 1px solid var(--border);
  }
  .sentence-feedback .your-answer {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .sentence-feedback .your-answer .text { color: var(--ink); }
  .sentence-feedback .correct-answer {
    font-size: 19px;
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .sentence-feedback .correct-answer .hangul { font-weight: 500; }
  .sentence-feedback .romaja {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 6px;
  }
  .sentence-feedback .gloss {
    font-size: 14px;
    color: var(--muted);
  }
  .grade-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .btn.grade-good { background: var(--green); }
  .btn.grade-bad { background: var(--red); }

  /* Reading */
  .text-list {
    display: grid;
    gap: 12px;
  }
  .text-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow);
  }
  .text-item:hover { transform: translateY(-1px); border-color: var(--accent); }
  .text-item .title-kr { font-family: 'Noto Sans KR'; font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .text-item .title-en { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .text-item .preview { font-family: 'Noto Sans KR'; font-size: 14px; color: var(--muted); line-height: 1.5; }
  .text-viewer {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: var(--shadow);
  }
  .text-viewer .back {
    background: none;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    margin-bottom: 16px;
  }
  .text-viewer h2 {
    font-family: 'Noto Sans KR';
    margin: 0 0 4px;
    font-size: 22px;
  }
  .text-viewer .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .text-body {
    font-family: 'Noto Sans KR';
    font-size: 19px;
    line-height: 1.85;
    margin-bottom: 16px;
  }
  .text-body .word {
    cursor: pointer;
    border-bottom: 1px dashed transparent;
    transition: all 0.15s;
  }
  .text-body .word.has-gloss { border-bottom-color: var(--accent); }
  .text-body .word.has-gloss:hover { background: var(--accent-soft); }
  .text-body .word.revealed { background: var(--accent-soft); }
  .text-toggles {
    display: flex;
    gap: 8px;
    margin: 16px 0;
    flex-wrap: wrap;
  }
  .text-translation {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15px;
    line-height: 1.6;
    margin-top: 12px;
  }
  .glossary {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-top: 12px;
    font-size: 14px;
  }
  .glossary h4 {
    margin: 0 0 8px;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .glossary-item { margin-bottom: 4px; }
  .glossary-item .hangul { font-weight: 500; margin-right: 6px; }
  .glossary-item .romaja { color: var(--muted); font-size: 12px; font-style: italic; }


  /* Streak header */
  .stat-pill.streak { background: var(--accent-soft); }
  .stat-pill.streak .num { color: var(--accent); }
  .stat-pill.timer .num { font-variant-numeric: tabular-nums; }
  .stat-pill.timer.met .num { color: var(--green); }
  /* Weekly focus selector */
  .focus-row { font-size: 13px; color: var(--muted); margin-top: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .focus-row select { font-family: inherit; font-size: 13px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); }
  /* Today mode chip */
  .chip.today.active { background: var(--green); border-color: var(--green); }
  /* Chunks display */
  .chunks-block {
    margin-top: 12px;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-align: left;
  }
  .chunks-block h5 {
    margin: 0 0 8px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .chunk-item {
    margin-bottom: 6px;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chunk-item:last-child { margin-bottom: 0; }
  .chunk-item .hangul { font-weight: 500; }
  .chunk-item .arrow { color: var(--muted); }
  .chunk-item .source-tag {
    font-size: 10px;
    background: var(--card);
    padding: 1px 6px;
    border-radius: 3px;
    color: var(--muted);
    text-transform: lowercase;
    border: 1px solid var(--border);
  }
  /* Journal */
  .journal-today {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .journal-today .date { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .journal-today h3 { font-family: 'Noto Sans KR'; font-size: 22px; margin: 0 0 14px; }
  textarea#journalInput {
    width: 100%;
    min-height: 220px;
    padding: 14px 16px;
    font-family: 'Noto Sans KR', 'Inter', sans-serif;
    font-size: 17px;
    line-height: 1.7;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    resize: vertical;
  }
  textarea#journalInput:focus { border-color: var(--accent); }
  .journal-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 13px; color: var(--muted); }
  .journal-prompt {
    background: var(--accent-soft);
    color: var(--accent);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .journal-history {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    box-shadow: var(--shadow);
  }
  .journal-history h4 { margin: 0 0 12px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .journal-entry { padding: 10px 0; border-top: 1px solid var(--border); cursor: pointer; }
  .journal-entry:first-of-type { border-top: none; }
  .journal-entry .entry-date { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .journal-entry .entry-text { font-family: 'Noto Sans KR'; font-size: 15px; line-height: 1.5; max-height: 60px; overflow: hidden; }
  .journal-export {
    margin-top: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    box-shadow: var(--shadow);
  }
  .journal-export-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .journal-export-label { font-size: 13px; color: var(--muted); }
  .journal-export-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .journal-export-actions .btn { padding: 8px 12px; font-size: 13px; }


  /* Plan tab */
  .plan-section { margin-bottom: 24px; }
  .plan-h {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0 0 10px;
    font-weight: 600;
  }
  .plan-card {
    padding: 20px 22px;
    min-height: auto;
    text-align: left;
  }
  .focus-stats { display: grid; gap: 8px; }
  .focus-stats .stat-line { display: flex; justify-content: space-between; align-items: baseline; font-size: 15px; }
  .focus-stats .stat-line .label { color: var(--muted); }
  .focus-stats .stat-line .val { font-weight: 600; }
  .progress-bar {
    height: 8px;
    background: var(--bg);
    border-radius: 4px;
    margin-top: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
    border-radius: 4px;
  }
  .progress-bar .fill.green { background: var(--green); }
  .week-chart { display: flex; gap: 6px; align-items: flex-end; height: 140px; padding: 8px 0 24px; }
  .week-chart .day-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; min-height: 100%; justify-content: flex-end; }
  .week-chart .bar {
    width: 100%;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    min-height: 4px;
    transition: height 0.3s;
  }
  .week-chart .bar.met { background: var(--green); }
  .week-chart .bar.empty { background: var(--border); min-height: 2px; }
  .week-chart .day-label { font-size: 11px; color: var(--muted); position: absolute; bottom: -22px; }
  .week-chart .day-min { font-size: 11px; color: var(--muted); }
  .week-chart .day-min.met { color: var(--green); font-weight: 600; }
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .stats-grid .stat-box {
    background: var(--bg);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .stats-grid .stat-box .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .stats-grid .stat-box .val { font-size: 22px; font-weight: 600; }
  .stats-grid .stat-box .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  textarea#weeklyNotesInput {
    width: 100%;
    min-height: 140px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.6;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    resize: vertical;
  }
  textarea#weeklyNotesInput:focus { border-color: var(--accent); }


  /* Word list view */
  .word-list-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .word-list-header {
    padding: 12px 18px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .word-list-header strong { color: var(--ink); }
  .word-row {
    display: grid;
    grid-template-columns: 26px 1fr 1.2fr 80px;
    gap: 10px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    cursor: pointer;
    transition: background 0.1s;
  }
  .word-row:last-child { border-bottom: none; }
  .word-row:hover { background: var(--bg); }
  .word-row.expanded { background: var(--bg); }
  .word-status { font-size: 14px; }
  .word-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .word-main .word-kr { font-family: 'Noto Sans KR'; font-size: 16px; font-weight: 500; }
  .word-main .word-rom { font-size: 11px; color: var(--muted); font-style: italic; }
  .word-en { font-size: 14px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .word-acc { font-size: 12px; color: var(--muted); text-align: right; }
  .word-acc.good { color: var(--green); }
  .word-acc.bad { color: var(--accent); }
  .word-detail {
    padding: 8px 18px 16px 54px;
    background: var(--bg);
    font-size: 13px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: none;
  }
  .word-detail.open { display: block; }
  .word-detail .example { margin-bottom: 6px; font-family: 'Noto Sans KR'; font-size: 14px; }
  .word-detail .chunk-mini {
    margin-top: 4px;
    padding-left: 12px;
    border-left: 2px solid var(--accent);
  }
  .empty-list {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }

  /* Replay queue indicator */

an appointment, so I have to leave early.","vocab":["약속","일찍"]},{"kr":"기차역이 어디에 있어요?","rom":"gichayeogi eodie isseoyo?","en":"Where is the train station?","vocab":["기차역","어디"]},{"kr":"선물을 받아서 기분이 좋아요.","rom":"seonmureul badaseo gibuni joayo.","en":"I got a gift, so I'm in a good mood.","vocab":["선물","받다","기분"]},{"kr":"사진을 찍는 것을 좋아해요.","rom":"sajineul jjikneun geoseul joahaeyo.","en":"I like taking photos.","vocab":["사진을 찍다"]},{"kr":"낚시는 제 취미예요.","rom":"naksineun je chwimiyeyo.","en":"Fishing is my hobby.","vocab":["낚시","취미"]},{"kr":"오늘은 무슨 요일이에요?","rom":"oneureun museun yoirieyo?","en":"What day of the week is it today?","vocab":["무슨","요일"]},{"kr":"저는 일주일에 한 번 운동해요.","rom":"jeoneun iljuire han beon undonghaeyo.","en":"I exercise once a week.","vocab":["일주일에 한 번"]},{"kr":"친구를 두 시간 동안 기다렸어요.","rom":"chingureul du sigan dongan gidaryeosseoyo.","en":"I waited two hours for my friend.","vocab":["기다리다"]},{"kr":"이 노래가 가장 좋아요.","rom":"i noraega gajang joayo.","en":"I like this song the most.","vocab":["노래","가장"]},{"kr":"은행에서 돈을 찾았어요.","rom":"eunhaengeseo doneul chajasseoyo.","en":"I withdrew money from the bank.","vocab":["은행","돈을 찾다"]},{"kr":"야채를 매일 먹어요.","rom":"yachaereul maeil meogeoyo.","en":"I eat vegetables every day.","vocab":["야채","매일"]},{"kr":"가족하고 같이 식당에 갔어요.","rom":"gajokhago gachi sikdange gasseoyo.","en":"I went to a restaurant with my family.","vocab":["가족"]},{"kr":"한국 드라마가 재미있어요.","rom":"hanguk deuramaga jaemiisseoyo.","en":"Korean dramas are fun.","vocab":[]},{"kr":"다음 주에 여행을 갈 거예요.","rom":"daeum jue yeohaengeul gal geoyeyo.","en":"Next week I'm going to travel.","vocab":["여행"]}];
const TEXTS = [{"id":"unit1b","title_kr":"Unit 1B — 내 음식 이야기","title_en":"Unit 1B — My food story","kr":"저는 한국 음식을 가장 좋아해요. 특히 매운 음식이 맛있어요. 김치는 조금 맵지만 정말 좋아해요. 일주일에 한 번 한국 식당에 가서 고기를 주문해요. 가끔 초밥도 먹어요.\n\n여름에는 수박이 가장 좋아요. 봄에는 자전거를 타요. 가을에는 사진을 찍어요. 겨울에는 시간이 많으면 친구하고 만나요.\n\n술은 안 마셔요. 운전하니까요. 야구를 좋아해서 일 년에 한 번 야구장에 가요. 한 달에 한 번 낚시도 해요. 혼자 가는 게 편해요.\n\n어제 친구한테서 선물을 받았어요. 정말 고마웠어요!","en":"I like Korean food the most. Spicy food is especially delicious. Kimchi is a little spicy, but I really like it. Once a week I go to a Korean restaurant and order meat. Sometimes I eat sushi too.\n\nIn summer, watermelon is the best. In spring, I ride a bike. In autumn, I take photos. In winter, when I have time, I meet up with friends.\n\nI don't drink alcohol — because I drive. I like baseball, so once a year I go to a baseball stadium. Once a month I also go fishing. I prefer going alone.\n\nYesterday I got a gift from a friend. I was really grateful!","glossary":[{"kr":"김치","rom":"gimchi","en":"kimchi"},{"kr":"식당","rom":"sikdang","en":"restaurant"},{"kr":"야구장","rom":"yagujang","en":"baseball stadium"},{"kr":"한테서","rom":"hanteseo","en":"from (someone)"},{"kr":"정말","rom":"jeongmal","en":"really"},{"kr":"고맙다","rom":"gomapda","en":"to be thankful"}]},{"id":"unit2","title_kr":"Unit 2 — 내 취미","title_en":"Unit 2 — My hobbies","kr":"제 취미는 그림을 그리는 것이에요. 매일 그림을 그려요. 가끔 노래도 불러요. 자주 음악도 들어요.\n\n일주일에 두 번 친구하고 등산을 해요. 산에서 사진을 찍는 것도 좋아해요. 주말에 가끔 당구를 치거나 볼링을 쳐요. 보통 친구하고 축구를 해요. 가끔 같이 춤도 춰요.\n\n독서도 좋아해요. 특히 신문을 읽는 걸 좋아해요. 도서관에서 책을 빌려요. 옷장에 책이 너무 많아요. 사무실에서도 책을 읽어요.\n\n일 년 전에 그림을 그리기 시작했어요. 오늘 은행에서 돈을 찾아서 새 그림 도구를 살 거예요.","en":"My hobby is drawing. I draw every day. Sometimes I also sing. I often listen to music too.\n\nTwice a week I go hiking with friends. I also love taking photos in the mountains. On weekends I sometimes play billiards or bowling. I usually play soccer with friends. Sometimes we dance together too.\n\nI also enjoy reading. I especially like reading the newspaper. I borrow books from the library. There are too many books in my wardrobe. I read books at the office too.\n\nI started drawing a year ago. Today I'll withdraw money from the bank to buy new art supplies.","glossary":[{"kr":"도서관","rom":"doseogwan","en":"library"},{"kr":"도구","rom":"dogu","en":"tool / supplies"},{"kr":"시작하다","rom":"sijakhada","en":"to start"},{"kr":"~거나","rom":"-geona","en":"or (between verbs)"}]},{"id":"unit3","title_kr":"Unit 3 — 내 옷차림","title_en":"Unit 3 — My outfit","kr":"오늘은 결혼식이 있어요. 그래서 정장을 입고 넥타이를 매요. 구두를 신고 양말도 새것이에요. 옷차림이 멋있다고 친구가 말했어요. 기분이 좋아요!\n\n보통 회사에 갈 때는 청바지하고 티셔츠를 입어요. 가끔 치마도 입어요. 운동할 때는 운동복을 입고 운동화를 신어요. 추운 날에는 모자를 쓰고 스카프를 매요. 안경도 써요.\n\n저녁에 친구를 만나는 약속이 있어요. 이따가 기차역 근처 식당에서 같이 저녁을 먹을 계획이에요. 새 지갑을 보여 줄 거예요. 너무 비쌌지만 정말 예뻐요.\n\n아침에는 보통 채소하고 생선을 먹어요. 아직 점심 메뉴는 정하지 못했어요.","en":"Today there's a wedding. So I'm wearing a suit and a tie. I have on dress shoes, and my socks are new. My friend said my outfit looks great. I'm in a good mood!\n\nUsually when I go to the office, I wear jeans and a T-shirt. Sometimes I wear a skirt. When I exercise, I wear sportswear and sneakers. On cold days I wear a hat and scarf. I also wear glasses.\n\nIn the evening I have plans to meet a friend. Later we'll have dinner together at a restaurant near the train station. I'm going to show off my new wallet. It was very expensive but really pretty.\n\nIn the morning I usually eat vegetables and fish. I haven't decided on the lunch menu yet.","glossary":[{"kr":"회사","rom":"hoesa","en":"company / office"},{"kr":"정하다","rom":"jeonghada","en":"to decide"},{"kr":"멋있다","rom":"meositda","en":"to be cool / stylish"},{"kr":"보여 주다","rom":"boyeo juda","en":"to show"},{"kr":"추운 날","rom":"chuun nal","en":"cold day"}]},{"id":"unit4","title_kr":"Unit 4 — 오늘의 일기","title_en":"Unit 4 — Today's diary","kr":"오늘은 너무 바빴어요. 아침부터 학교에 가서 시험을 봤어요. 시험이 정말 어려웠어요. 머리가 아파요. 너무 피곤해요.\n\n점심을 안 먹어서 배가 고파요. 식당에 손님이 너무 많아서 오래 기다렸어요. 음식 가격이 비쌌지만 맛있었어요.\n\n오후에 비가 와서 우산을 찾았어요. 지하철도 늦었어요. 기분이 나빴어요. 슬펐어요.\n\n집에 와서 숙제를 했어요. 숙제는 쉬워요. 내일은 날씨가 좋으면 좋겠어요. 너무 덥지 않고 눈도 안 오면 좋겠어요.\n\n저는 큰 꿈이 있어요. 가족하고 넓고 편한 집에서 살고 싶어요. 작은 집은 불편해요.","en":"Today I was very busy. From the morning I went to school and took an exam. The exam was really difficult. My head hurts. I'm very tired.\n\nI didn't have lunch, so I'm hungry. The restaurant had too many customers, so I waited a long time. The food was expensive, but delicious.\n\nIn the afternoon it rained, so I looked for an umbrella. The subway was also late. I was in a bad mood. I was sad.\n\nI came home and did homework. Homework is easy. I hope tomorrow's weather is good. I hope it's not too hot and that it doesn't snow.\n\nI have a big dream. I want to live with my family in a wide, comfortable house. A small house is uncomfortable.","glossary":[{"kr":"머리","rom":"meori","en":"head"},{"kr":"시험을 보다","rom":"siheomeul boda","en":"to take an exam"},{"kr":"우산","rom":"usan","en":"umbrella"},{"kr":"지하철","rom":"jihacheol","en":"subway"},{"kr":"좋겠어요","rom":"joketsseoyo","en":"I hope (it's)"},{"kr":"살다","rom":"salda","en":"to live"}]},{"id":"unit5","title_kr":"Unit 5 — 길 안내","title_en":"Unit 5 — Directions","kr":"실례합니다. 화장실이 어디에 있어요? 학교 근처에 있어요. 어떻게 가요?\n\n은행은 저 큰 건물 안에 있어요. 똑바로 가다가 길을 건너가세요. 그 다음에 왼쪽으로 돌아가세요. 은행 앞에 주차장이 있어요. 거기서 친구를 기다려요.\n\n공항에 가려면 어떻게 가요? 지하철이 제일 빨라요. 지하철역까지 걸어서 가세요. 계단으로 올라가세요. 그 다음에 1번 출구로 나가세요. 거기서 공항까지 30분 걸려요.\n\n오늘은 무슨 요일이에요? 시계를 보세요. 시간이 없어서 일찍 가야 해요. 수업이 곧 시작돼요. 지난 계절에 한국에 갔어요. 정말 좋았어요!","en":"Excuse me, where is the bathroom? It's near the school. How do I get there?\n\nThe bank is inside that big building. Go straight, then cross the street. After that, turn left. There's a parking lot in front of the bank. Wait for your friend there.\n\nHow do I get to the airport? The subway is fastest. Walk to the subway station. Go up the stairs. Then go out through exit 1. From there, it's 30 minutes to the airport.\n\nWhat day of the week is today? Look at the clock. I have no time, so I have to leave early. Class starts soon. Last season I went to Korea. It was really nice!","glossary":[{"kr":"실례합니다","rom":"sillyehamnida","en":"excuse me"},{"kr":"왼쪽","rom":"oenjjok","en":"left side"},{"kr":"지하철","rom":"jihacheol","en":"subway"},{"kr":"출구","rom":"chulgu","en":"exit"},{"kr":"곧","rom":"got","en":"soon"}]},{"id":"morning","title_kr":"내 아침","title_en":"My morning","kr":"저는 매일 아침 일찍 일어나요. 보통 일곱 시쯤 일어나요. 일어나서 아침을 먹어요. 아침에는 빵하고 커피를 먹어요. 그 다음에 학교에 가요. 학교는 집 근처에 있어요. 그래서 걸어서 가요.","en":"I get up early every morning. Usually I wake up around seven o'clock. After waking up, I eat breakfast. In the morning I have bread and coffee. Then I go to school. The school is near my house. So I walk there.","glossary":[{"kr":"쯤","rom":"jjeum","en":"about / approximately"},{"kr":"그 다음에","rom":"geu daeume","en":"after that / then"},{"kr":"걸어서","rom":"georeoseo","en":"on foot / walking"}]},{"id":"food","title_kr":"한국 음식","title_en":"Korean food","kr":"저는 한국 음식을 좋아해요. 특히 김치찌개를 가장 좋아해요. 김치찌개는 조금 매워요. 하지만 정말 맛있어요. 가족하고 같이 한국 식당에 자주 가요. 다음에는 불고기도 먹어 보고 싶어요.","en":"I like Korean food. I especially like kimchi stew the most. Kimchi stew is a little spicy. But it's really delicious. I often go to a Korean restaurant with my family. Next time I want to try bulgogi too.","glossary":[{"kr":"김치찌개","rom":"gimchijjigae","en":"kimchi stew"},{"kr":"정말","rom":"jeongmal","en":"really"},{"kr":"불고기","rom":"bulgogi","en":"bulgogi (marinated beef)"},{"kr":"~어 보고 싶어요","rom":"-eo bogo sipeoyo","en":"I want to try ~"}]},{"id":"weekend","title_kr":"내 주말","title_en":"My weekend","kr":"주말에는 보통 친구를 만나요. 같이 영화를 보거나 카페에 가요. 일요일에는 집에서 쉬어요. 책을 읽거나 음악을 들어요. 가끔 등산을 하러 가요. 산이 너무 높아서 힘들지만 재미있어요.","en":"On weekends I usually meet friends. We watch movies together or go to a cafe. On Sundays I rest at home. I read books or listen to music. Sometimes I go hiking. The mountain is so high it's hard, but it's fun.","glossary":[{"kr":"~거나","rom":"-geona","en":"or (between verbs)"},{"kr":"~러 가요","rom":"-reo gayo","en":"go in order to ~"},{"kr":"힘들다","rom":"himdeulda","en":"to be hard / tough"}]},{"id":"travel","title_kr":"여행 계획","title_en":"Travel plans","kr":"다음 달에 부산에 갈 거예요. 부산은 한국에서 두 번째로 큰 도시예요. 비행기로 가지 않고 기차로 가요. 부산에서 바다를 보고 해산물을 먹고 싶어요. 친구도 같이 갈 거예요. 정말 기대돼요!","en":"Next month I'm going to Busan. Busan is the second-largest city in Korea. I'm not going by plane, I'm going by train. In Busan I want to see the sea and eat seafood. My friend is going with me too. I'm really looking forward to it!","glossary":[{"kr":"부산","rom":"busan","en":"Busan (city)"},{"kr":"두 번째로","rom":"du beonjjaero","en":"second / 2nd"},{"kr":"도시","rom":"dosi","en":"city"},{"kr":"비행기","rom":"bihaenggi","en":"airplane"},{"kr":"바다","rom":"bada","en":"sea"},{"kr":"해산물","rom":"haesanmul","en":"seafood"},{"kr":"기대돼요","rom":"gidaedwaeyo","en":"I'm looking forward to it"}]},{"id":"studying","title_kr":"한국어 공부","title_en":"Studying Korean","kr":"저는 한국어를 일 년 전에 배우기 시작했어요. 처음에는 정말 어려웠어요. 특히 문법이 어려워요. 하지만 매일 조금씩 공부하면 늘어요. K-pop 노래를 들으면서 단어를 배워요. 한국 친구하고 한국어로 이야기하고 싶어요.","en":"I started learning Korean a year ago. At first it was really difficult. Grammar is especially hard. But if I study a little every day, I improve. I learn vocabulary while listening to K-pop songs. I want to talk in Korean with Korean friends.","glossary":[{"kr":"처음에는","rom":"cheoeumeneun","en":"at first"},{"kr":"문법","rom":"munbeop","en":"grammar"},{"kr":"조금씩","rom":"jogeumssik","en":"little by little"},{"kr":"늘다","rom":"neulda","en":"to improve / increase"},{"kr":"~면서","rom":"-myeonseo","en":"while ~ing"},{"kr":"단어","rom":"daneo","en":"vocabulary / word"}]},{"id":"family","title_kr":"내 가족","title_en":"My family","kr":"우리 가족은 네 명이에요. 아버지, 어머니, 오빠하고 저예요. 아버지는 회사에 다니세요. 어머니는 선생님이에요. 오빠는 대학생이에요. 저는 가족을 정말 사랑해요. 우리는 자주 같이 저녁을 먹어요.","en":"There are four people in my family: father, mother, older brother, and me. My father works at a company. My mother is a teacher. My older brother is a university student. I really love my family. We often eat dinner together.","glossary":[{"kr":"명","rom":"myeong"," const STORAGE_KEY = "korean_quiz_stats_v1";
let stats = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let mode = "forgotten";
let modeValue = null;
let direction = "ru_kr";
let session = { asked: 0, correct: 0 };
let current = null;
let phase = "asking"; // asking | revealed
let viewMode = "quiz"; // quiz | list
let replayQueue = []; // FIFO of wrong-answered entries this session
let cardsSinceLastReplay = 0;

const $ = (s) => document.querySelector(s);
const card = $("#card");
const statsEl = $("#stats");
const sessionBar = $("#sessionBar");

function saveStats() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
}

function pool() {
  if (mode === "all") return VOCAB;
  if (mode === "forgotten") return VOCAB.filter(e => e.status === "forgotten");
  if (mode === "new") return VOCAB.filter(e => e.status === "new");
  if (mode === "today") {
    // mix forgotten words + this week's unit (new) words
    const week = getWeekUnit();
    return VOCAB.filter(e => e.status === "forgotten" || (e.status === "new" && e.unit === week));
  }
  if (mode === "topic") return VOCAB.filter(e => e.topic === modeValue);
  if (mode === "unit") return VOCAB.filter(e => e.unit === modeValue);
  return VOCAB;
}

function weight(entry) {
  let w = entry.status === "forgotten" ? 3.0 : 1.0;
  const s = stats[entry.korean];
  if (s) {
    const total = (s.right || 0) + (s.wrong || 0);
    w += (s.wrong || 0) * 0.7;
    w -= (s.right || 0) * 0.15;
    if (total >= 4 && (s.right / total) > 0.85) w *= 0.4;
  }
  // avoid repeating last word immediately
  if (current && entry.korean === current.korean) w *= 0.05;
  return Math.max(w, 0.2);
}

function pick(p) {
  if (!p.length) return null;
  cardsSinceLastReplay++;
  // Every ~3 cards, pull from replay queue if there's a queued word that's still in the pool
  if (replayQueue.length > 0 && cardsSinceLastReplay >= 3) {
    const idx = replayQueue.findIndex(w => p.some(e => e.korean === w.korean) && (!current || w.korean !== current.korean));
    if (idx >= 0) {
      cardsSinceLastReplay = 0;
      return replayQueue.splice(idx, 1)[0];
    }
  }
  const weights = p.map(weight);
  const sum = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * sum;
  for (let i = 0; i < p.length; i++) {
    r -= weights[i];
    if (r <= 0) return p[i];
  }
  return p[p.length - 1];
}

function normalize(s) {
  return (s || "").trim().toLowerCase().replace(/\s+/g, " ");
}

function levenshtein(a, b) {
  if (a === b) return 0;
  if (!a) return b.length;
  if (!b) return a.length;
  const m = a.length, n = b.length;
  if (Math.abs(m - n) > 4) return 99; // early bail-out for very different lengths
  let prev = Array(n + 1).fill(0).map((_, i) => i);
  for (let i = 1; i <= m; i++) {
    const curr = [i];
    for (let j = 1; j <= n; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      curr.push(Math.min(prev[j] + 1, curr[j - 1] + 1, prev[j - 1] + cost));
    }
    prev = curr;
  }
  return prev[n];
}

function fuzzyThreshold(len) {
  if (len <= 3) return 0;
  if (len <= 7) return 1;
  return 2;
}

// Returns { match: 'exact' | 'typo' | 'none', correct?: string, distance?: number }
function checkAnswer(user, correct) {
  const u = normalize(user);
  if (!u) return { match: "none" };
  const variants = correct.split("/").map(v => normalize(v));
  for (const v of variants) {
    if (u === v) return { match: "exact" };
  }
  // Typo detection — only for short single-word answers (avoid being too lenient on phrases)
  for (const v of variants) {
    const dist = levenshtein(u, v);
    if (dist <= fuzzyThreshold(v.length)) {
      return { match: "typo", correct: v, distance: dist };
    }
  }
  return { match: "none" };
}

function renderStats() {
  const forgotten = VOCAB.filter(e => e.status === "forgotten").length;
  const learned = Object.values(stats).filter(s => {
    const t = (s.right || 0) + (s.wrong || 0);
    return t >= 4 && s.right / t > 0.85;
  }).length;
  const dp = getDailyProgress();
  const min = Math.floor(dp.seconds / 60);
  const sec = dp.seconds % 60;
  const goalMet = dp.seconds >= GOAL_SECONDS;
  statsEl.innerHTML = `
    <span class="stat-pill streak">🔥 <span class="num">${dp.streak}</span> day${dp.streak === 1 ? "" : "s"}</span>
    <span class="stat-pill timer ${goalMet ? "met" : ""}">⏱ <span class="num">${min}:${String(sec).padStart(2, "0")}</span> / ${GOAL_MIN}m</span>
    <span class="stat-pill fire">forgotten <span class="num">${forgotten}</span></span>
    <span class="stat-pill">learned <span class="num">${learned}</span></span>
  `;
}

function renderSessionBar() {
  if (!session.asked) {
    sessionBar.innerHTML = "";
    return;
  }
  const pct = Math.round(100 * session.correct / session.asked);
  sessionBar.innerHTML = `session: <strong>${session.correct}/${session.asked}</strong> (${pct}%) <button class="reset" id="newSession">new session</button>`;
  $("#newSession").onclick = () => { session = { asked: 0, correct: 0 }; renderSessionBar(); };
}

function renderCard() {
  renderReplayIndicator();
  const p = pool();
  if (!p.length) {
    card.innerHTML = `<div class="empty">Empty here. Pick another mode.</div>`;
    return;
  }
  current = pick(p);
  phase = "asking";
  const isKR = direction === "kr_ru";
  const question = isKR ? current.korean : current.translation;
  const promptText = "";
  const placeholder = isKR ? "type answer…" : "한국어…";
  const fireBadge = current.status === "forgotten" ? '<span class="tag forgotten">🔥 forgotten</span>' : '';

  card.innerHTML = `
    <div class="question-meta">
      ${fireBadge}
      <span class="tag">unit ${current.unit}</span>
      <span class="tag">${current.topic}</span>
    </div>
    <div class="question ${isKR ? 'kr-mode' : ''}">${escapeHtml(question)}</div>
    <div class="question-prompt">${promptText}</div>
    <div class="input-wrap">
      <input type="text" id="answerInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="${placeholder}">
      <button class="btn" id="checkBtn">check</button>
    </div>
    <div class="actions">
      <button class="btn ghost" id="skipBtn">skip</button>
    </div>
  `;
  const input = $("#answerInput");
  input.focus();
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") submit();
  });
  $("#checkBtn").onclick = submit;
  $("#skipBtn").onclick = () => reveal("skip");
}

function showHint() {
  const hintEl = card.querySelector(".question-prompt");
  hintEl.innerHTML = `hint: <strong>${escapeHtml(current.romanization)}</strong>`;
}

function submit() {
  if (phase !== "asking") return;
  const input = $("#answerInput");
  const val = input.value.trim();
  if (!val) {
    reveal("skip");
    return;
  }
  // Try exact-then-fuzzy across all valid targets
  const targets = direction === "kr_ru"
    ? [current.translation]
    : [current.korean, current.romanization];
  let best = { match: "none" };
  for (const t of targets) {
    const r = checkAnswer(val, t);
    if (r.match === "exact") { best = r; break; }
    if (r.match === "typo" && (best.match === "none" || (r.distance < (best.distance ?? 99)))) best = r;
  }
  if (best.match === "exact") reveal("correct", val);
  else if (best.match === "typo") reveal("typo", val, best.correct);
  else reveal("wrong", val);
}

function reveal(result, userVal, autoCorrected) {
  phase = "revealed";
  const s = stats[current.korean] = stats[current.korean] || { right: 0, wrong: 0 };
  if (result === "correct" || result === "typo") {
    s.right++; session.correct++; session.asked++;
  } else if (result === "wrong") {
    s.wrong++; session.asked++;
    if (current && !replayQueue.some(w => w.korean === current.korean)) {
      replayQueue.push(current);
    }
  }
  else { /* skip — not counted */ }
  s.last = new Date().toISOString();
  saveStats();

  const isKR = direction === "kr_ru";
  const correct = isKR ? current.translation : current.korean;
  const pair = isKR ? current.korean : current.translation;

  let header = "";
  if (result === "correct") header = `<div class="feedback correct"><div class="answer-line">✅ correct</div>`;
  else if (result === "typo") header = `<div class="feedback correct"><div class="answer-line">✅ close enough — typo: <em>${escapeHtml(userVal)}</em> → <strong>${escapeHtml(autoCorrected)}</strong></div>`;
  else if (result === "wrong") header = `<div class="feedback wrong"><div class="answer-line">❌ you wrote: <em>${escapeHtml(userVal)}</em></div>`;
  else header = `<div class="feedback skip"><div class="answer-line">⏭ skipped</div>`;

  const icon = getIcon(current.korean);
  const answerHtml = `
    <div class="answer-line">
      ${icon ? `<span class="word-icon">${icon}</span> ` : ""}<span class="hangul">${escapeHtml(current.korean)}</span>
      — ${escapeHtml(current.translation)}
    </div>
    ${current.example ? `<div class="example">${escapeHtml(current.example)}</div>` : ""}
    </div>
  `;

  card.querySelector(".actions").innerHTML = `
    <button class="btn" id="nextBtn">next →</button>
    <button class="btn secondary" id="repeatBtn">show more often</button>
  `;
  // Show chunks if we have any for this word
  const ck = CHUNKS[current.korean];
  if (ck && ck.length) {
    const cb = document.createElement("div");
    cb.className = "chunks-block";
    cb.innerHTML = `<h5>chunks · how it's used</h5>` + ck.map(c => `
      <div class="chunk-item">
        <span class="hangul">${escapeHtml(c.kr)}</span>
        <span class="arrow">—</span>
        <span>${escapeHtml(c.en)}</span>
        <span class="source-tag">${escapeHtml(c.tag)}</span>
      </div>
    `).join("");
    card.appendChild(cb);
  }
  // Append feedback below input area
  const feedbackContainer = document.createElement("div");
  feedbackContainer.innerHTML = header + answerHtml;
  card.appendChild(feedbackContainer);

  $("#nextBtn").onclick = next;
  $("#nextBtn").focus();
  $("#repeatBtn").onclick = () => {
    s.wrong = (s.wrong || 0) + 1;
    saveStats();
    next();
  };

  document.addEventListener("keydown", spaceToNext);
  renderSessionBar();
  renderStats();
}

function spaceToNext(e) {
  if (phase !== "revealed") return;
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    next();
  }
}

function next() {
  document.removeEventListener("keydown", spaceToNext);
  renderCard();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function fillSelectors() {
  const topics = [...new Set(VOCAB.map(e => e.topic))].sort();
  const units = [...new Set(VOCAB.map(e => e.unit))].sort();
  const topicSel = $("#topicSel");
  topics.forEach(t => {
    const cnt = VOCAB.filter(e => e.topic === t).length;
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = `${t} (${cnt})`;
    topicSel.appendChild(opt);
  });
  const unitSel = $("#unitSel");
  units.forEach(u => {
    const cnt = VOCAB.filter(e => e.unit === u).length;
    const opt = document.createElement("option");
    opt.value = u; opt.textContent = `unit ${u} (${cnt})`;
    unitSel.appendChild(opt);
  });
  topicSel.onchange = () => {
    if (!topicSel.value) return;
    setMode("topic", topicSel.value);
    unitSel.value = "";
    document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
  };
  unitSel.onchange = () => {
    if (!unitSel.value) return;
    setMode("unit", unitSel.value);
    topicSel.value = "";
    document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
  };
}

function setMode(m, v = null) {
  mode = m;
  modeValue = v;
  session = { asked: 0, correct: 0 };
  if (viewMode === "list") {
    renderWordList();

    renderCard();
  }
  renderSessionBar();
}

function bindControls() {
  document.querySelectorAll("[data-mode]").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      $("#topicSel").value = "";
      $("#unitSel").value = "";
      setMode(btn.dataset.mode);
    };
  });
  document.querySelectorAll("[data-dir]").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll("[data-dir]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      direction = btn.dataset.dir;
      renderCard();
    };
  });
  $("#resetBtn").onclick = () => {
    if (confirm("Reset all answer stats?")) {
      stats = {};
      saveStats();
      session = { asked: 0, correct: 0 };
      renderStats();
      renderSessionBar();
    }
  };
  $("#exportBtn").onclick = () => {
    const blob = new Blob([JSON.stringify(stats, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "korean_stats.json"; a.click();
    URL.revokeObjectURL(url);
  };
}


function renderReplayIndicator() {
  const el = document.getElementById("replayIndicator");

  if (replayQueue.length > 0) {

function setViewMode(v) {

  document.querySelectorAll("[data-view]").forEach(b => b.classList.toggle("active", b.dataset.view === v));
  if (v === "list") {

    document.getElementById("replayIndicator").style.display = "";

function renderWordList() {
  const p = pool();
  const el = document.getElementById("wordList");
  if (!p.length) {
    el.innerHTML = `<div class="empty-list">No words match this filter.</div>`;
    return;
  }
  // Sort: forgotten first, then by korean
  const sorted = [...p].sort((a, b) => {
    if (a.status !== b.status) return a.status === "forgotten" ? -1 : 1;
    return a.korean.localeCompare(b.korean, "ko");
  });
  const rows = sorted.map(e => {
    const s = stats[e.korean];
    let acc = "—";
    let accClass = "";
    if (s) {
      const t = (s.right || 0) + (s.wrong || 0);
      if (t > 0) {
        const pct = Math.round(100 * (s.right || 0) / t);
        acc = `${s.right || 0}/${t} (${pct}%)`;
        accClass = pct >= 85 ? "good" : (pct < 50 ? "bad" : "");
      }
    }
    const statusIcon = e.status === "forgotten" ? "🔥" : "✨";
    const icon = getIcon(e.korean);
    return `
      <div class="word-row" data-key="${escapeHtml(e.korean)}">
        <div class="word-status">${statusIcon}</div>
        <div class="word-main">
          <div class="word-kr">${icon ? `<span class="word-icon-sm">${icon}</span> ` : ""}${escapeHtml(e.korean)}</div>
        </div>
        <div class="word-en">${escapeHtml(e.translation)}</div>
        <div class="word-acc ${accClass}">${acc}</div>
      </div>
      <div class="word-detail" data-key="${escapeHtml(e.korean)}">
        <div class="word-en-mobile" style="color:var(--ink);margin-bottom:6px;">${escapeHtml(e.translation)}</div>
        ${e.example ? `<div class="example">${escapeHtml(e.example)}</div>` : ""}
        <div style="font-size:11px;color:var(--muted);">unit ${escapeHtml(e.unit)} · ${escapeHtml(e.topic)}</div>
        ${(CHUNKS[e.korean] || []).map(c => `
          <div class="chunk-mini">
            <span style="font-family:'Noto Sans KR';">${escapeHtml(c.kr)}</span>
            <span> — ${escapeHtml(c.en)}</span>
            <span style="font-size:10px;color:var(--muted);"> · ${escapeHtml(c.tag)}</span>
          </div>
        `).join("")}
      </div>
    `;
  }).join("");
  const headerCount = `<strong>${sorted.length}</strong> word${sorted.length === 1 ? "" : "s"}`;
  el.innerHTML = `
    <div class="word-list-header">
      <span>${headerCount}</span>
      <span>tap a word for details</span>
    </div>
    ${rows}
  `;
  el.querySelectorAll(".word-row").forEach(row => {
    row.onclick = () => {
      const key = row.dataset.key;
      const detail = el.querySelector(`.word-detail[data-key="${CSS.escape(key)}"]`);
      const wasOpen = detail.classList.contains("open");
      // close all others
      el.querySelectorAll(".word-detail.open").forEach(d => d.classList.remove("open"));
      el.querySelectorAll(".word-row.expanded").forEach(r => r.classList.remove("expanded"));
      if (!wasOpen) {
        detail.classList.add("open");
        row.classList.add("expanded");
      }
    };
  });
}

// ===== SENTENCES =====
const SENT_KEY = "korean_sentence_stats_v1";
let sentStats = JSON.parse(localStorage.getItem(SENT_KEY) || "{}");
let sentDir = "en_kr";
let currentSent = null;
let sentPhase = "asking";
let sentSession = { asked: 0, correct: 0 };

function saveSentStats() { localStorage.setItem(SENT_KEY, JSON.stringify(sentStats)); }

function pickSentence() {
  const weights = SENTENCES.map(s => {
    const st = sentStats[s.kr] || {};
    let w = 1.0 + (st.wrong || 0) * 0.8 - (st.right || 0) * 0.15;
    if (currentSent && s.kr === currentSent.kr) w *= 0.05;
    return Math.max(w, 0.2);
  });
  const sum = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * sum;
  for (let i = 0; i < SENTENCES.length; i++) {
    r -= weights[i];
    if (r <= 0) return SENTENCES[i];
  }
  return SENTENCES[0];
}

function renderSentence() {
  const card = $("#sentenceCard");
  currentSent = pickSentence();
  sentPhase = "asking";
  const isKR = sentDir === "kr_en";
  const question = isKR ? currentSent.kr : currentSent.en;
  const promptText = "";

  card.innerHTML = `
    <div class="question-meta">
      <span class="tag">sentence ${SENTENCES.indexOf(currentSent) + 1} / ${SENTENCES.length}</span>
    </div>
    <div class="question ${isKR ? 'kr-mode' : ''}">${escapeHtml(question)}</div>
    <div class="question-prompt">${promptText}</div>
    <textarea id="sentenceInput" placeholder="type your translation…" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
    <div class="actions">
      <button class="btn" id="revealBtn">reveal answer</button>
      <button class="btn ghost" id="sentSkipBtn">skip</button>
    </div>
  `;
  $("#sentenceInput").focus();
  $("#sentenceInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) revealSentence();
  });
  $("#revealBtn").onclick = revealSentence;
  $("#sentSkipBtn").onclick = () => {
    currentSent = null;
    renderSentence();
  };
}

function revealSentence() {
  if (sentPhase !== "asking") return;
  sentPhase = "revealed";
  const userVal = $("#sentenceInput").value.trim();
  const isKR = sentDir === "kr_en";
  const correct = isKR ? currentSent.en : currentSent.kr;

  const card = $("#sentenceCard");
  const fb = document.createElement("div");
  fb.className = "sentence-feedback";
  fb.innerHTML = `
    ${userVal ? `<div class="your-answer">your answer: <span class="text">${escapeHtml(userVal)}</span></div>` : ""}
    <div class="correct-answer">
      <span class="hangul">${escapeHtml(currentSent.kr)}</span>
    </div>
    <div class="gloss">${escapeHtml(currentSent.en)}</div>
  `;
  card.appendChild(fb);

  // Replace actions with grade buttons
  card.querySelector(".actions").innerHTML = `
    <button class="btn grade-good" id="gotItBtn">✅ got it</button>
    <button class="btn grade-bad" id="missedBtn">❌ missed it</button>
  `;
  $("#gotItBtn").onclick = () => gradeSentence("right");
  $("#missedBtn").onclick = () => gradeSentence("wrong");
  $("#gotItBtn").focus();
}

function gradeSentence(result) {
  const s = sentStats[currentSent.kr] = sentStats[currentSent.kr] || { right: 0, wrong: 0 };
  if (result === "right") { s.right++; sentSession.correct++; sentSession.asked++; }
  else { s.wrong++; sentSession.asked++; }
  s.last = new Date().toISOString();
  saveSentStats();
  renderSentenceSessionBar();
  renderSentence();
}

function renderSentenceSessionBar() {
  const bar = $("#sentenceSessionBar");
  if (!sentSession.asked) { bar.innerHTML = ""; return; }
  const pct = Math.round(100 * sentSession.correct / sentSession.asked);
  bar.innerHTML = `session: <strong>${sentSession.correct}/${sentSession.asked}</strong> (${pct}%) <button class="reset" id="newSentSession">new session</button>`;
  $("#newSentSession").onclick = () => { sentSession = { asked: 0, correct: 0 }; renderSentenceSessionBar(); };
}

function openText(id) {
  const t = TEXTS.find(x => x.id === id);
  if (!t) return;

  let bodyHtml = escapeHtml(t.kr);
  // Replace each glossary term with a span (longest first to avoid overlaps)
  const keys = Object.keys(glossMap).sort((a, b) => b.length - a.length);
  keys.forEach(k => {
    const escK = escapeHtml(k);
    const re = new RegExp(escK.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g');
    bodyHtml = bodyHtml.replace(re, `<span class="word has-gloss" data-key="${escK.replace(/"/g, '&quot;')}">${escK}</span>`);
  });

  v.innerHTML = `
    <div class="text-viewer">
      <button class="back" id="backBtn">← back to list</button>
      <h2>${escapeHtml(t.title_kr)}</h2>
      <div class="subtitle">${escapeHtml(t.title_en)}</div>
      <div class="text-body" id="textBody">${bodyHtml}</div>
      <div class="text-toggles">
        <button class="btn secondary" id="toggleEn">show English</button>

      </div>

      <div class="glossary" id="glossPanel" hidden>

        ${t.glossary.map(g => `
          <div class="glossary-item">
            <span class="hangul">${escapeHtml(g.kr)}</span>

    $("#toggleEn").textContent = p.hidden ? "show English" : "hide English";

  $("#toggleGloss").onclick = () => {

    p.hidden = !p.hidden;

      el.appendChild(span);

  });
}


// ===== DAILY PROGRESS / STREAK / TIMER =====
const DAILY_KEY = "korean_daily_v1";
const HISTORY_KEY = "korean_daily_history_v1";
const META_KEY = "korean_meta_v1";
const WEEKLY_NOTES_PREFIX = "korean_weekly_notes_";
const WEEK_KEY = "korean_week_unit_v1";
const JOURNAL_PREFIX = "korean_journal_";
const GOAL_MIN = 15;
const GOAL_SECONDS = GOAL_MIN * 60;
const IDLE_MS = 90 * 1000;

function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function getDailyProgress() {
  const raw = localStorage.getItem(DAILY_KEY);
  let dp = raw ? JSON.parse(raw) : { date: todayStr(), seconds: 0, streak: 0, lastActiveDate: null };
  const today = todayStr();
  if (dp.date !== today) {
    const yesterday = (() => {
      const d = new Date(); d.setDate(d.getDate() - 1);
      return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    })();
    const newStreak = (dp.lastActiveDate === yesterday) ? dp.streak : 0;
    dp = { date: today, seconds: 0, streak: newStreak, lastActiveDate: dp.lastActiveDate };
  }
  return dp;
}

function saveDailyProgress(dp) {
  localStorage.setItem(DAILY_KEY, JSON.stringify(dp));
  const h = JSON.parse(localStorage.getItem(HISTORY_KEY) || "{}");
  h[dp.date] = dp.seconds;
  // Track longest streak too
  const meta = JSON.parse(localStorage.getItem(META_KEY) || "{}");
  meta.maxStreak = Math.max(meta.maxStreak || 0, dp.streak || 0);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  localStorage.setItem(META_KEY, JSON.stringify(meta));
}

let lastActivityAt = Date.now();
let timerInterval = null;
function noteActivity() { lastActivityAt = Date.now(); }
["click", "keydown", "input", "scroll", "touchstart"].forEach(ev => document.addEventListener(ev, noteActivity, { passive: true }));

function tickTimer() {
  if (document.hidden) return;
  if (Date.now() - lastActivityAt > IDLE_MS) return;
  const dp = getDailyProgress();
  const firstActivityToday = dp.lastActiveDate !== dp.date;
  dp.seconds = (dp.seconds || 0) + 1;
  if (firstActivityToday) {
    dp.streak = (dp.streak || 0) + 1;
    dp.lastActiveDate = dp.date;
  }
  saveDailyProgress(dp);
  if (dp.seconds % 5 === 0) renderStats();
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(tickTimer, 1000);
}

// ===== JOURNAL =====
const JOURNAL_PROMPTS = [
  "오늘 무엇을 했어요? — What did you do today?",
  "지금 기분이 어때요? — How do you feel right now?",
  "오늘 날씨가 어땠어요? — How was the weather today?",
  "오늘 누구를 만났어요? — Who did you meet today?",
  "내일 무엇을 하고 싶어요? — What do you want to do tomorrow?",
  "오늘 무엇을 먹었어요? — What did you eat today?",
  "오늘 가장 좋은 일은 뭐였어요? — What was the best part of today?",
  "이번 주말 계획이 뭐예요? — What are your plans for this weekend?",
  "지난 주에 뭐 했어요? — What did you do last week?",
  "지금 어디에 있어요? — Where are you right now?",
];
function pickJournalPrompt() {
  const seed = todayStr().split("-").reduce((a, b) => a + parseInt(b, 10), 0);
  return JOURNAL_PROMPTS[seed % JOURNAL_PROMPTS.length];
}

function renderJournal() {
  const today = todayStr();
  document.getElementById("journalDate").textContent = today;
  document.getElementById("journalPrompt").textContent = "💡 " + pickJournalPrompt();
  const ta = document.getElementById("journalInput");
  ta.value = localStorage.getItem(JOURNAL_PREFIX + today) || "";
  document.getElementById("journalCount").textContent = ta.value.length + " chars";

  let saveTimer = null;
  ta.oninput = () => {
    document.getElementById("journalCount").textContent = ta.value.length + " chars";
    document.getElementById("journalSaveStatus").textContent = "saving…";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      if (ta.value.trim()) localStorage.setItem(JOURNAL_PREFIX + today, ta.value);
      else localStorage.removeItem(JOURNAL_PREFIX + today);
      document.getElementById("journalSaveStatus").textContent = "saved ✓";
      renderJournalHistory();
    }, 500);
  };
  renderJournalHistory();
  renderJournalExport();
}

function getAllJournalEntries() {
  const entries = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith(JOURNAL_PREFIX)) continue;
    const date = key.slice(JOURNAL_PREFIX.length);
    const text = localStorage.getItem(key);
    if (text && text.trim()) entries.push({ date, text });
  }
  entries.sort((a, b) => a.date.localeCompare(b.date));
  return entries;
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function exportJournalMD() {
  const entries = getAllJournalEntries();
  if (!entries.length) { alert("No entries to export yet."); return; }
  const lines = [
    `# Korean Journal`,
    `_Exported ${todayStr()} · ${entries.length} entr${entries.length === 1 ? "y" : "ies"}_`,
    "",
  ];
  // Reverse so newest first in Markdown
  for (const e of [...entries].reverse()) {
    lines.push(`## ${e.date}`, "", e.text, "");
  }
  downloadFile(`korean-journal-${todayStr()}.md`, lines.join("\n"), "text/markdown");
}

function exportJournalJSON() {
  const entries = getAllJournalEntries();
  if (!entries.length) { alert("No entries to export yet."); return; }
  const payload = {
    exportedAt: new Date().toISOString(),
    appVersion: "korean-journal-1",
    entries,
  };
  downloadFile(`korean-journal-${todayStr()}.json`, JSON.stringify(payload, null, 2), "application/json");
}

function importJournalJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const list = Array.isArray(data) ? data : data.entries;
      if (!Array.isArray(list)) throw new Error("Invalid format");
      let imported = 0, overwritten = 0, skipped = 0;
      for (const e of list) {
        if (!e.date || !e.text) continue;
        const key = JOURNAL_PREFIX + e.date;
        const existing = localStorage.getItem(key);
        if (existing && existing.trim() === e.text.trim()) { skipped++; continue; }
        if (existing) overwritten++;
        else imported++;
        localStorage.setItem(key, e.text);
      }
      alert(`Imported ${imported} new entr${imported === 1 ? "y" : "ies"}.${overwritten ? ` Overwrote ${overwritten}.` : ""}${skipped ? ` Skipped ${skipped} duplicates.` : ""}`);
      renderJournal();
    } catch (e) {
      alert("Import failed: " + e.message);
    }
  };
  reader.readAsText(file);
}

function renderJournalExport() {
  const el = document.getElementById("journalExport");
  if (!el) return;
  const count = getAllJournalEntries().length;
  el.innerHTML = `
    <div class="journal-export-bar">
      <span class="journal-export-label">${count} entr${count === 1 ? "y" : "ies"} saved on this device</span>
      <div class="journal-export-actions">
        <button class="btn secondary" id="exportMdBtn">📥 export .md</button>
        <button class="btn secondary" id="exportJsonBtn">📦 backup .json</button>
        <button class="btn ghost" id="importJsonBtn">📤 import…</button>
        <input type="file" id="importFile" accept=".json,application/json" hidden>
      </div>
    </div>
  `;
  document.getElementById("exportMdBtn").onclick = exportJournalMD;
  document.getElementById("exportJsonBtn").onclick = exportJournalJSON;
  const importInput = document.getElementById("importFile");
  document.getElementById("importJsonBtn").onclick = () => importInput.click();
  importInput.onchange = () => {
    if (importInput.files && importInput.files[0]) importJournalJSON(importInput.files[0]);
    importInput.value = "";
  };
}

function renderJournalHistory() {
  const today = todayStr();
  const entries = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key.startsWith(JOURNAL_PREFIX)) continue;
    const date = key.slice(JOURNAL_PREFIX.length);
    if (date === today) continue;
    entries.push({ date, text: localStorage.getItem(key) });
  }
  entries.sort((a, b) => b.date.localeCompare(a.date));
  const el = document.getElementById("journalHistory");
  if (!entries.length) {
    el.innerHTML = `<h4>past entries</h4><div style="color:var(--muted);font-size:14px;">No past entries yet. Today's entry will appear here tomorrow.</div>`;
    return;
  }
  el.innerHTML = `<h4>past entries (${entries.length})</h4>` + entries.slice(0, 10).map(e => `
    <div class="journal-entry" data-date="${e.date}">
      <div class="entry-date">${e.date}</div>
      <div class="entry-text">${escapeHtml(e.text)}</div>
    </div>
  `).join("");
  el.querySelectorAll(".journal-entry").forEach(node => {
    node.onclick = () => {
      const d = node.dataset.date;
      const text = localStorage.getItem(JOURNAL_PREFIX + d) || "";
      alert(`${d}\n\n${text}`);
    };
  });
}


// ===== PLAN TAB =====
function getDailyHistory() {
  return JSON.parse(localStorage.getItem(HISTORY_KEY) || "{}");
}

function getMeta() {
  return JSON.parse(localStorage.getItem(META_KEY) || "{}");
}

function isoDateNDaysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function isoToWeekday(iso) {
  const [y, m, day] = iso.split("-").map(Number);
  return new Date(y, m - 1, day).toLocaleDateString("en-US", { weekday: "short" });
}

function getCurrentWeekStart() {
  // Monday-based; gives ISO for monday of current week
  const d = new Date();
  const day = d.getDay() || 7; // sun=0 → 7
  d.setDate(d.getDate() - (day - 1));
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function renderWeekFocusCard() {
  const week = getWeekUnit();
  const unitWords = VOCAB.filter(e => e.unit === week);
  const total = unitWords.length;
  // "Mastered" = right/total >= 0.85 with at least 4 attempts
  const mastered = unitWords.filter(e => {
    const s = stats[e.korean];
    if (!s) return false;
    const t = (s.right || 0) + (s.wrong || 0);
    return t >= 4 && (s.right / t) >= 0.85;
  }).length;
  const pct = total ? Math.round(100 * mastered / total) : 0;
  const card = document.getElementById("weekFocusCard");
  card.innerHTML = `
    <div class="focus-stats">
      <div class="stat-line"><span class="label">Unit</span><span class="val">${escapeHtml(week)}</span></div>
      <div class="stat-line"><span class="label">Words in unit</span><span class="val">${total}</span></div>
      <div class="stat-line"><span class="label">Mastered (≥85%, 4+ tries)</span><span class="val">${mastered} / ${total}</span></div>
    </div>
    <div class="progress-bar"><div class="fill ${pct >= 80 ? 'green' : ''}" style="width:${pct}%"></div></div>
    <div style="font-size:13px;color:var(--muted);margin-top:8px;">${pct}% complete · change unit in <strong>Words → this week's focus</strong></div>
  `;
}

function renderWeekChartCard() {
  const history = getDailyHistory();
  // Today's seconds (live)
  const dpNow = getDailyProgress();
  history[dpNow.date] = dpNow.seconds;
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const iso = isoDateNDaysAgo(i);
    const sec = history[iso] || 0;
    days.push({ iso, sec, min: Math.floor(sec / 60), met: sec >= GOAL_SECONDS });
  }
  const maxSec = Math.max(...days.map(d => d.sec), GOAL_SECONDS);
  const card = document.getElementById("weekChartCard");
  card.innerHTML = `
    <div class="week-chart">
      ${days.map(d => {
        const pct = maxSec ? (d.sec / maxSec * 100) : 0;
        const cls = d.sec === 0 ? "empty" : (d.met ? "met" : "");
        const minCls = d.met ? "met" : "";
        const wd = isoToWeekday(d.iso).slice(0, 2);
        return `
          <div class="day-col">
            <div class="day-min ${minCls}">${d.min || ""}</div>
            <div class="bar ${cls}" style="height:${Math.max(pct, 1)}%"></div>
            <div class="day-label">${wd}</div>
          </div>
        `;
      }).join("")}
    </div>
    <div style="margin-top:24px;font-size:13px;color:var(--muted);">Goal line: ${GOAL_MIN} min · green = goal met</div>
  `;
}

function renderOverallStatsCard() {
  const meta = getMeta();
  const history = getDailyHistory();
  const dpNow = getDailyProgress();
  history[dpNow.date] = dpNow.seconds;
  // Words mastered overall
  const masteredWords = Object.entries(stats).filter(([k, s]) => {
    const t = (s.right || 0) + (s.wrong || 0);
    return t >= 4 && (s.right / t) >= 0.85;
  }).length;
  // Total study time
  const totalSec = Object.values(history).reduce((a, b) => a + b, 0);
  const totalMin = Math.floor(totalSec / 60);
  const totalH = Math.floor(totalMin / 60);
  const totalDisplay = totalH > 0 ? `${totalH}h ${totalMin % 60}m` : `${totalMin}m`;
  // Days active
  const daysActive = Object.values(history).filter(s => s > 60).length;
  // Sentence stats
  const sentTotal = Object.keys(sentStats).length;
  const sentRight = Object.values(sentStats).reduce((a, s) => a + (s.right || 0), 0);
  // Journal entries
  let journalCount = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(JOURNAL_PREFIX)) journalCount++;
  }
  const card = document.getElementById("overallStatsCard");
  card.innerHTML = `
    <div class="stats-grid">
      <div class="stat-box">
        <div class="label">🔥 Current streak</div>
        <div class="val">${dpNow.streak} days</div>
        <div class="sub">longest: ${meta.maxStreak || dpNow.streak}</div>
      </div>
      <div class="stat-box">
        <div class="label">⏱ Total study time</div>
        <div class="val">${totalDisplay}</div>
        <div class="sub">${daysActive} active days</div>
      </div>
      <div class="stat-box">
        <div class="label">📚 Words mastered</div>
        <div class="val">${masteredWords} / ${VOCAB.length}</div>
        <div class="sub">${Math.round(100*masteredWords/VOCAB.length)}% of vocab</div>
      </div>
      <div class="stat-box">
        <div class="label">📝 Sentences practiced</div>
        <div class="val">${sentTotal}</div>
        <div class="sub">${sentRight} correct</div>
      </div>
      <div class="stat-box">
        <div class="label">📓 Journal entries</div>
        <div class="val">${journalCount}</div>
        <div class="sub">days written in Korean</div>
      </div>
      <div class="stat-box">
        <div class="label">🎯 Today</div>
        <div class="val">${Math.floor(dpNow.seconds/60)} / ${GOAL_MIN}m</div>
        <div class="sub">${dpNow.seconds >= GOAL_SECONDS ? "goal met ✓" : "keep going"}</div>
      </div>
    </div>
  `;
}

function renderWeeklyNotes() {
  const wkStart = getCurrentWeekStart();
  const key = WEEKLY_NOTES_PREFIX + wkStart;
  const ta = document.getElementById("weeklyNotesInput");
  ta.value = localStorage.getItem(key) || "";

}

}
