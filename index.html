<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>한국어 · your dictionary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #1f1d1a;
    --muted: #7d756c;
    --accent: #c2410c;
    --accent-soft: #fde8d8;
    --green: #15803d;
    --green-soft: #dcfce7;
    --red: #b91c1c;
    --red-soft: #fee2e2;
    --border: #ece7df;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .hangul { font-family: 'Noto Sans KR', 'Inter', sans-serif; }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }
  h1 {
    font-size: 22px;
    margin: 0;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  h1 .kr { font-family: 'Noto Sans KR'; color: var(--accent); margin-right: 6px; }
  .stats {
    display: flex;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .stat-pill {
    background: var(--card);
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
  }
  .stat-pill .num { color: var(--ink); font-weight: 600; }
  .stat-pill.fire .num { color: var(--accent); }

  .controls {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .control-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .control-row:last-child { margin-bottom: 0; }
  .control-label {
    font-size: 12px;
    color: var(--muted);
    width: 100%;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .chip {
    background: transparent;
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
    color: var(--ink);
    font-family: inherit;
    transition: all 0.15s;
  }
  .chip:hover { background: var(--bg); }
  .chip.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .chip.fire.active { background: var(--accent); border-color: var(--accent); }
  select.chip {
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%237d756c' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 26px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: var(--shadow);
    min-height: 280px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }
  .question-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .question-meta .tag {
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .question-meta .tag.forgotten { color: var(--accent); background: var(--accent-soft); }
  .question {
    font-size: 44px;
    font-weight: 500;
    margin-bottom: 8px;
    line-height: 1.2;
    word-break: keep-all;
  }
  .question.kr-mode { font-family: 'Noto Sans KR', sans-serif; }
  .question-prompt {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .input-wrap {
    display: flex;
    gap: 8px;
    max-width: 420px;
    margin: 0 auto;
  }
  input[type="text"] {
    flex: 1;
    padding: 12px 16px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  .btn {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    background: var(--ink);
    color: #fff;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn.secondary {
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--border);
  }
  .btn.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .actions {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .feedback {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 12px;
    text-align: left;
  }
  .feedback.correct { background: var(--green-soft); color: var(--green); }
  .feedback.wrong { background: var(--red-soft); color: var(--red); }
  .feedback.skip { background: var(--bg); color: var(--muted); border: 1px dashed var(--border); }
  .feedback .answer-line { font-size: 18px; margin-bottom: 4px; }
  .feedback .answer-line .hangul { font-weight: 600; font-size: 22px; }
  .feedback .romaja { font-style: italic; font-size: 13px; opacity: 0.8; }
  .feedback .example { margin-top: 8px; font-size: 14px; opacity: 0.85; }

  .session-bar {
    margin-top: 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  .session-bar strong { color: var(--ink); }
  .session-bar .reset {
    background: none;
    border: none;
    color: var(--muted);
    text-decoration: underline;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    padding: 0;
    margin-left: 8px;
  }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; }

  .footer-actions {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
  }
  .footer-actions a, .footer-actions button {
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
    font-size: 12px;
    margin: 0 6px;
    padding: 0;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    box-shadow: var(--shadow);
  }
  .tab {
    flex: 1;
    background: transparent;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    background: var(--ink);
    color: #fff;
  }
  .view { display: none; }
  .view.active { display: block; }

  /* Sentences */
  .sentence-card .question {
    font-size: 22px;
    line-height: 1.5;
    font-weight: 400;
    margin-bottom: 12px;
    text-align: left;
    padding: 0 8px;
  }
  .sentence-card .question.kr-mode { font-size: 24px; }
  textarea#sentenceInput {
    width: 100%;
    min-height: 80px;
    padding: 12px 16px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    resize: vertical;
    line-height: 1.5;
  }
  textarea#sentenceInput:focus { border-color: var(--accent); }
  .sentence-feedback {
    margin-top: 16px;
    padding: 16px 20px;
    border-radius: 12px;
    text-align: left;
    background: var(--bg);
    border: 1px solid var(--border);
  }
  .sentence-feedback .your-answer {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .sentence-feedback .your-answer .text { color: var(--ink); }
  .sentence-feedback .correct-answer {
    font-size: 19px;
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .sentence-feedback .correct-answer .hangul { font-weight: 500; }
  .sentence-feedback .romaja {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 6px;
  }
  .sentence-feedback .gloss {
    font-size: 14px;
    color: var(--muted);
  }
  .grade-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .btn.grade-good { background: var(--green); }
  .btn.grade-bad { background: var(--red); }

  /* Reading */
  .text-list {
    display: grid;
    gap: 12px;
  }
  .text-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow);
  }
  .text-item:hover { transform: translateY(-1px); border-color: var(--accent); }
  .text-item .title-kr { font-family: 'Noto Sans KR'; font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .text-item .title-en { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .text-item .preview { font-family: 'Noto Sans KR'; font-size: 14px; color: var(--muted); line-height: 1.5; }
  .text-viewer {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: var(--shadow);
  }
  .text-viewer .back {
    background: none;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    padding: 0;
    margin-bottom: 16px;
  }
  .text-viewer h2 {
    font-family: 'Noto Sans KR';
    margin: 0 0 4px;
    font-size: 22px;
  }
  .text-viewer .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .text-body {
    font-family: 'Noto Sans KR';
    font-size: 19px;
    line-height: 1.85;
    margin-bottom: 16px;
  }
  .text-body .word {
    cursor: pointer;
    border-bottom: 1px dashed transparent;
    transition: all 0.15s;
  }
  .text-body .word.has-gloss { border-bottom-color: var(--accent); }
  .text-body .word.has-gloss:hover { background: var(--accent-soft); }
  .text-body .word.revealed { background: var(--accent-soft); }
  .text-toggles {
    display: flex;
    gap: 8px;
    margin: 16px 0;
    flex-wrap: wrap;
  }
  .text-translation {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15px;
    line-height: 1.6;
    margin-top: 12px;
  }
  .glossary {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-top: 12px;
    font-size: 14px;
  }
  .glossary h4 {
    margin: 0 0 8px;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .glossary-item { margin-bottom: 4px; }
  .glossary-item .hangul { font-weight: 500; margin-right: 6px; }
  .glossary-item .romaja { color: var(--muted); font-size: 12px; font-style: italic; }

  @media (max-width: 480px) {
    .question { font-size: 36px; }
    .card { padding: 24px 16px; min-height: 240px; }
    .container { padding: 16px 12px 60px; }
    h1 { font-size: 18px; }
    .sentence-card .question { font-size: 20px; }
    .text-body { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span class="kr">한국어</span>· your dictionary</h1>
    <div class="stats" id="stats"></div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="words">Words</button>
    <button class="tab" data-tab="sentences">Sentences</button>
    <button class="tab" data-tab="reading">Reading</button>
  </nav>

  <div class="view active" id="wordsView">
    <div class="controls">
      <div class="control-row">
        <span class="control-label">mode</span>
        <button class="chip fire active" data-mode="forgotten">🔥 Forgotten</button>
        <button class="chip" data-mode="new">✨ New</button>
        <button class="chip" data-mode="all">All</button>
        <select class="chip" id="topicSel"><option value="">by topic…</option></select>
        <select class="chip" id="unitSel"><option value="">by unit…</option></select>
      </div>
      <div class="control-row">
        <span class="control-label">direction</span>
        <button class="chip" data-dir="kr_ru">한 → en</button>
        <button class="chip active" data-dir="ru_kr">en → 한</button>
      </div>
    </div>

    <div class="card" id="card">
      <div class="empty">Loading…</div>
    </div>

    <div class="session-bar" id="sessionBar"></div>
  </div>

  <div class="view" id="sentencesView">
    <div class="controls">
      <div class="control-row">
        <span class="control-label">direction</span>
        <button class="chip" data-sdir="kr_en">한 → en</button>
        <button class="chip active" data-sdir="en_kr">en → 한</button>
      </div>
    </div>
    <div class="card sentence-card" id="sentenceCard">
      <div class="empty">Loading…</div>
    </div>
    <div class="session-bar" id="sentenceSessionBar"></div>
  </div>

  <div class="view" id="readingView">
    <div id="textList" class="text-list"></div>
    <div id="textViewer" hidden></div>
  </div>

  <div class="footer-actions">
    <button id="exportBtn">export progress</button>·
    <button id="resetBtn">reset stats</button>
  </div>
</div>

<script>
const VOCAB = [{"korean":"시계","romanization":"sigye","translation":"clock","status":"forgotten","unit":"5","topic":"objects","example":"시계가 있어요. — There is a clock."},{"korean":"돈","romanization":"don","translation":"money","status":"forgotten","unit":"5","topic":"objects","example":"돈이 없어요. — I don't have money."},{"korean":"창문","romanization":"changmun","translation":"window","status":"forgotten","unit":"5","topic":"objects","example":"창문을 열어요. — I open the window."},{"korean":"방향","romanization":"banghyang","translation":"direction","status":"forgotten","unit":"5","topic":"place","example":"어느 방향이에요? — Which direction?"},{"korean":"이동","romanization":"idong","translation":"movement","status":"forgotten","unit":"5","topic":"place","example":"이동 시간이 길어요. — The travel time is long."},{"korean":"근처","romanization":"geuncheo","translation":"nearby","status":"forgotten","unit":"5","topic":"place","example":"학교 근처에 살아요. — I live near the school."},{"korean":"주차장","romanization":"juchajang","translation":"parking lot","status":"forgotten","unit":"5","topic":"place","example":"주차장이 어디예요? — Where is the parking lot?"},{"korean":"건물","romanization":"geonmul","translation":"building","status":"forgotten","unit":"5","topic":"place","example":"큰 건물이에요. — It's a big building."},{"korean":"맞아요","romanization":"majayo","translation":"that's right","status":"forgotten","unit":"5","topic":"phrases","example":"네 맞아요. — Yes, that's right."},{"korean":"학교","romanization":"hakgyo","translation":"school","status":"forgotten","unit":"5","topic":"place","example":"학교에 가요. — I go to school."},{"korean":"지난","romanization":"jinan","translation":"last/past","status":"forgotten","unit":"5","topic":"time","example":"지난 주에. — Last week."},{"korean":"봄","romanization":"bom","translation":"spring","status":"forgotten","unit":"1B","topic":"seasons","example":"봄이 좋아요. — I like spring."},{"korean":"여름","romanization":"yeoreum","translation":"summer","status":"forgotten","unit":"1B","topic":"seasons" const TEXTS = [{"id":"morning","title_kr":"내 아침","title_en":"My morning","kr":"저는 매일 아침 일찍 일어나요. 보통 일곱 시쯤 일어나요. 일어나서 아침을 먹어요. 아침에는 빵하고 커피를 먹어요. 그 다음에 학교에 가요. 학교는 집 근처에 있어요. 그래서 걸어서 가요.","en":"I get up early every morning. Usually I wake up around seven o'clock. After waking up, I eat breakfast. In the morning I have bread and coffee. Then I go to school. The school is near my house. So I walk there.","glossary":[{"kr":"쯤","rom":"jjeum","en":"about / approximately"},{"kr":"그 다음에","rom":"geu daeume","en":"after that / then"},{"kr":"걸어서","rom":"georeoseo","en":"on foot / walking"}]},{"id":"food","title_kr":"한국 음식","title_en":"Korean food","kr":"저는 한국 음식을 좋아해요. 특히 김치찌개를 가장 좋아해요. 김치찌개는 조금 매워요. 하지만 정말 맛있어요. 가족하고 같이 한국 식당에 자주 가요. 다음에는 불고기도 먹어 보고 싶어요.","en":"I like Korean food. I especially like kimchi stew the most. Kimchi stew is a little spicy. But it's really delicious. I often go to a Korean restaurant with my family. Next time I want to try bulgogi too.","glossary":[{"kr":"김치찌개","rom":"gimchijjigae","en":"kimchi stew"},{"kr":"정말","rom":"jeongmal","en":"really"},{"kr":"불고기","rom":"bulgogi","en":"bulgogi (marinated beef)"},{"kr":"~어 보고 싶어요","rom":"-eo bogo sipeoyo","en":"I want to try ~"}]},{"id":"weekend","title_kr":"내 주말","title_en":"My weekend","kr":"주말에는 보통 친구를 만나요. 같이 영화를 보거나 카페에 가요. 일요일에는 집에서 쉬어요. 책을 읽거나 음악을 들어요. 가끔 등산을 하러 가요. 산이 너무 높아서 힘들지만 재미있어요.","en":"On weekends I usually meet friends. We watch movies together or go to a cafe. On Sundays I rest at home. I read books or listen to music. Sometimes I go hiking. The mountain is so high it's hard, but it's fun.","glossary":[{"kr":"~거나","rom":"-geona","en":"or (between verbs)"},{"kr":"~러 가요","rom":"-reo gayo","en":"go in order to ~"},{"kr":"힘들다","rom":"himdeulda","en":"to be hard / tough"}]},{"id":"travel","title_kr":"여행 계획","title_en":"Travel plans","kr":"다음 달에 부산에 갈 거예요. 부산은 한국에서 두 번째로 큰 도시예요. 비행기로 가지 않고 기차로 가요. 부산에서 바다를 보고 해산물을 먹고 싶어요. 친구도 같이 갈 거예요. 정말 기대돼요!","en":"Next month I'm going to Busan. Busan is the second-largest city in Korea. I'm not going by plane, I'm going by train. In Busan I want to see the sea and eat seafood. My friend is going with me too. I'm really looking forward to it!","glossary":[{"kr":"부산","rom":"busan","en":"Busan (city)"},{"kr":"두 번째로","rom":"du beonjjaero","en":"second / 2nd"},{"kr":"도시","rom":"dosi","en":"city"},{"kr":"비행기","rom":"bihaenggi","en":"airplane"},{"kr":"바다","rom":"bada","en":"sea"},{"kr":"해산물","rom":"haesanmul","en":"seafood"},{"kr":"기대돼요","rom":"gidaedwaeyo","en":"I'm looking forward to it"}]},{"id":"studying","title_kr":"한국어 공부","title_en":"Studying Korean","kr":"저는 한국어를 일 년 전에 배우기 시작했어요. 처음에는 정말 어려웠어요. 특히 문법이 어려워요. 하지만 매일 조금씩 공부하면 늘어요. K-pop 노래를 들으면서 단어를 배워요. 한국 친구하고 한국어로 이야기하고 싶어요.","en":"I started learning Korean a year ago. At first it was really difficult. Grammar is especially hard. But if I study a little every day, I improve. I learn vocabulary while listening to K-pop songs. I want to talk in Korean with Korean friends.","glossary":[{"kr":"처음에는","rom":"cheoeumeneun","en":"at first"},{"kr":"문법","rom":"munbeop","en":"grammar"},{"kr":"조금씩","rom":"jogeumssik","en":"little by little"},{"kr":"늘다","rom":"neulda","en":"to improve / increase"},{"kr":"~면서","rom":"-myeonseo","en":"while ~ing"},{"kr":"단어","rom":"daneo","en":"vocabulary / word"}]},{"id":"family","title_kr":"내 가족","title_en":"My family","kr":"우리 가족은 네 명이에요. 아버지, 어머니, 오빠하고 저예요. 아버지는 회사에 다니세요. 어머니는 선생님이에요. 오빠는 대학생이에요. 저는 가족을 정말 사랑해요. 우리는 자주 같이 저녁을 먹어요.","en":"There are four people in my family: father, mother, older brother, and me. My father works at a company. My mother is a teacher. My older brother is a university student. I really love my family. We often eat dinner together.","glossary":[{"kr":"명","rom":"myeong","en":"counter for people"},{"kr":"아버지","rom":"abeoji","en":"father"},{"kr":"어머니","rom":"eomeoni","en":"mother"},{"kr":"오빠","rom":"oppa","en":"older brother (of a female)"},{"kr":"회사에 다니다","rom":"hoesae danida","en":"to work at a company"},{"kr":"대학생","rom const STORAGE_KEY = "korean_quiz_stats_v1";

function saveStats() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(stats));
}

function pool() {
  if (mode === "all") return VOCAB;
  if (mode === "forgotten") return VOCAB.filter(e => e.status === "forgotten");
  if (mode === "new") return VOCAB.filter(e => e.status === "new");
  if (mode === "topic") return VOCAB.filter(e => e.topic === modeValue);
  if (mode === "unit") return VOCAB.filter(e => e.unit === modeValue);
  return VOCAB;
}

function weight(entry) {
  let w = entry.status === "forgotten" ? 3.0 : 1.0;
  const s = stats[entry.korean];
  if (s) {
    const total = (s.right || 0) + (s.wrong || 0);
    w += (s.wrong || 0) * 0.7;
    w -= (s.right || 0) * 0.15;
    if (total >= 4 && (s.right / total) > 0.85) w *= 0.4;
  }
  // avoid repeating last word immediately
  if (current && entry.korean === current.korean) w *= 0.05;
  return Math.max(w, 0.2);
}

function pick(p) {
  if (!p.length) return null;
  const weights = p.map(weight);
  const sum = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * sum;
  for (let i = 0; i < p.length; i++) {
    r -= weights[i];
    if (r <= 0) return p[i];
  }
  return p[p.length - 1];
}

function normalize(s) {
  return (s || "").trim().toLowerCase().replace(/\s+/g, " ");
}

function checkAnswer(user, correct) {
  const u = normalize(user);
  if (!u) return false;
  return correct.split("/").some(v => normalize(v) === u);
}

function renderStats() {
  const total = VOCAB.length;
  const forgotten = VOCAB.filter(e => e.status === "forgotten").length;
  const learned = Object.values(stats).filter(s => {
    const t = (s.right || 0) + (s.wrong || 0);
    return t >= 4 && s.right / t > 0.85;
  }).length;
  statsEl.innerHTML = `
    <span class="stat-pill">total <span class="num">${total}</span></span>
    <span class="stat-pill fire">forgotten <span class="num">${forgotten}</span></span>
    <span class="stat-pill">learned <span class="num">${learned}</span></span>
  `;
}

function renderSessionBar() {
  if (!session.asked) {
    sessionBar.innerHTML = "";
    return;
  }
  const pct = Math.round(100 * session.correct / session.asked);
  sessionBar.innerHTML = `session: <strong>${session.correct}/${session.asked}</strong> (${pct}%) <button class="reset" id="newSession">new session</button>`;
  $("#newSession").onclick = () => { session = { asked: 0, correct: 0 }; renderSessionBar(); };
}

function renderCard() {
  const p = pool();
  if (!p.length) {
    card.innerHTML = `<div class="empty">Empty here. Pick another mode.</div>`;
    return;
  }
  current = pick(p);
  phase = "asking";
  const isKR = direction === "kr_ru";
  const question = isKR ? current.korean : current.translation;
  const promptText = isKR ? "translation?" : "in Korean? (hangul or romanization)";
  const placeholder = isKR ? "type answer…" : "한국어 or romanization…";
  const fireBadge = current.status === "forgotten" ? '<span class="tag forgotten">🔥 forgotten</span>' : '';

  card.innerHTML = `
    <div class="question-meta">
      ${fireBadge}
      <span class="tag">unit ${current.unit}</span>
      <span class="tag">${current.topic}</span>
    </div>
    <div class="question ${isKR ? 'kr-mode' : ''}">${escapeHtml(question)}</div>
    <div class="question-prompt">${promptText}</div>
    <div class="input-wrap">
      <input type="text" id="answerInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="${placeholder}">
      <button class="btn" id="checkBtn">check</button>
    </div>
    <div class="actions">
      <button class="btn ghost" id="hintBtn">💡 hint</button>
      <button class="btn ghost" id="skipBtn">skip</button>
    </div>
  `;
  const input = $("#answerInput");
  input.focus();
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") submit();
  });
  $("#checkBtn").onclick = submit;
  $("#hintBtn").onclick = showHint;
  $("#skipBtn").onclick = () => reveal("skip");
}

function showHint() {
  const hintEl = card.querySelector(".question-prompt");
  hintEl.innerHTML = `hint: <strong>${escapeHtml(current.romanization)}</strong>`;
}

function submit() {
  if (phase !== "asking") return;
  const input = $("#answerInput");
  const val = input.value.trim();
  if (!val) {
    reveal("skip");
    return;
  }
  let ok;
  if (direction === "kr_ru") {
    ok = checkAnswer(val, current.translation);
  } else {
    // EN → KR: accept hangul or romanization
    ok = checkAnswer(val, current.korean) || checkAnswer(val, current.romanization);
  }
  reveal(ok ? "correct" : "wrong", val);
}

function reveal(result, userVal) {
  phase = "revealed";
  const s = stats[current.korean] = stats[current.korean] || { right: 0, wrong: 0 };
  if (result === "correct") { s.right++; session.correct++; session.asked++; }
  else if (result === "wrong") { s.wrong++; session.asked++; }
  else { /* skip — not counted */ }
  s.last = new Date().toISOString();
  saveStats();

  const isKR = direction === "kr_ru";
  const correct = isKR ? current.translation : current.korean;
  const pair = isKR ? current.korean : current.translation;

  let header = "";
  if (result === "correct") header = `<div class="feedback correct"><div class="answer-line">✅ correct</div>`;
  else if (result === "wrong") header = `<div class="feedback wrong"><div class="answer-line">❌ you wrote: <em>${escapeHtml(userVal)}</em></div>`;
  else header = `<div class="feedback skip"><div class="answer-line">⏭ skipped</div>`;

  const answerHtml = `
    <div class="answer-line">
      <span class="hangul">${escapeHtml(current.korean)}</span>
      <span class="romaja"> [${escapeHtml(current.romanization)}]</span>
      — ${escapeHtml(current.translation)}
    </div>
    ${current.example ? `<div class="example">${escapeHtml(current.example)}</div>` : ""}
    </div>
  `;

  card.querySelector(".actions").innerHTML = `
    <button class="btn" id="nextBtn">next →</button>
    <button class="btn secondary" id="repeatBtn">show more often</button>
  `;
  // Append feedback below input area
  const feedbackContainer = document.createElement("div");
  feedbackContainer.innerHTML = header + answerHtml;
  card.appendChild(feedbackContainer);

  $("#nextBtn").onclick = next;
  $("#nextBtn").focus();
  $("#repeatBtn").onclick = () => {
    s.wrong = (s.wrong || 0) + 1;
    saveStats();
    next();
  };

  document.addEventListener("keydown", spaceToNext);
  renderSessionBar();
  renderStats();
}

function spaceToNext(e) {
  if (phase !== "revealed") return;
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    next();
  }
}

function next() {
  document.removeEventListener("keydown", spaceToNext);
  renderCard();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function fillSelectors() {
  const topics = [...new Set(VOCAB.map(e => e.topic))].sort();
  const units = [...new Set(VOCAB.map(e => e.unit))].sort();
  const topicSel = $("#topicSel");
  topics.forEach(t => {
    const cnt = VOCAB.filter(e => e.topic === t).length;
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = `${t} (${cnt})`;
    topicSel.appendChild(opt);
  });
  const unitSel = $("#unitSel");
  units.forEach(u => {
    const cnt = VOCAB.filter(e => e.unit === u).length;
    const opt = document.createElement("option");
    opt.value = u; opt.textContent = `unit ${u} (${cnt})`;
    unitSel.appendChild(opt);
  });
  topicSel.onchange = () => {
    if (!topicSel.value) return;
    setMode("topic", topicSel.value);
    unitSel.value = "";
    document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
  };
  unitSel.onchange = () => {
    if (!unitSel.value) return;
    setMode("unit", unitSel.value);
    topicSel.value = "";
    document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
  };
}

function setMode(m, v = null) {
  mode = m;
  modeValue = v;
  session = { asked: 0, correct: 0 };
  renderCard();
  renderSessionBar();
}

function bindControls() {
  document.querySelectorAll("[data-mode]").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      $("#topicSel").value = "";
      $("#unitSel").value = "";
      setMode(btn.dataset.mode);
    };
  });
  document.querySelectorAll("[data-dir]").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll("[data-dir]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      direction = btn.dataset.dir;
      renderCard();
    };
  });
  $("#resetBtn").onclick = () => {
    if (confirm("Reset all answer stats?")) {
      stats = {};
      saveStats();
      session = { asked: 0, correct: 0 };
      renderStats();
      renderSessionBar();
    }
  };
  $("#exportBtn").onclick = () => {
    const blob = new Blob([JSON.stringify(stats, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "korean_stats.json"; a.click();
    URL.revokeObjectURL(url);
  };
}

// ===== TABS =====
function bindTabs() {
  document.querySelectorAll(".tab").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const target = btn.dataset.tab;
      document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
      document.getElementById(target + "View").classList.add("active");
      if (target === "sentences") renderSentence();
      if (target === "reading") renderTextList();
    };
  });
}

// ===== SENTENCES =====
const SENT_KEY = "korean_sentence_stats_v1";
let sentStats = JSON.parse(localStorage.getItem(SENT_KEY) || "{}");
let sentDir = "en_kr";
let currentSent = null;
let sentPhase = "asking";
let sentSession = { asked: 0, correct: 0 };

function saveSentStats() { localStorage.setItem(SENT_KEY, JSON.stringify(sentStats)); }

function pickSentence() {
  const weights = SENTENCES.map(s => {
    const st = sentStats[s.kr] || {};
    let w = 1.0 + (st.wrong || 0) * 0.8 - (st.right || 0) * 0.15;
    if (currentSent && s.kr === currentSent.kr) w *= 0.05;
    return Math.max(w, 0.2);
  });
  const sum = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * sum;
  for (let i = 0; i < SENTENCES.length; i++) {
    r -= weights[i];
    if (r <= 0) return SENTENCES[i];
  }
  return SENTENCES[0];
}

function renderSentence() {
  const card = $("#sentenceCard");
  currentSent = pickSentence();
  sentPhase = "asking";
  const isKR = sentDir === "kr_en";
  const question = isKR ? currentSent.kr : currentSent.en;
  const promptText = isKR ? "" : "translate to Korean (hangul or romanization)";

  card.innerHTML = `
    <div class="question-meta">
      <span class="tag">sentence ${SENTENCES.indexOf(currentSent) + 1} / ${SENTENCES.length}</span>
    </div>
    <div class="question ${isKR ? 'kr-mode' : ''}">${escapeHtml(question)}</div>
    <div class="question-prompt">${promptText}</div>
    <textarea id="sentenceInput" placeholder="type your translation…" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
    <div class="actions">
      <button class="btn" id="revealBtn">reveal answer</button>
      <button class="btn ghost" id="sentSkipBtn">skip</button>
    </div>
  `;
  $("#sentenceInput").focus();
  $("#sentenceInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) revealSentence();
  });
  $("#revealBtn").onclick = revealSentence;
  $("#sentSkipBtn").onclick = () => {
    currentSent = null;
    renderSentence();
  };
}

function revealSentence() {
  if (sentPhase !== "asking") return;
  sentPhase = "revealed";
  const userVal = $("#sentenceInput").value.trim();
  const isKR = sentDir === "kr_en";
  const correct = isKR ? currentSent.en : currentSent.kr;

  const card = $("#sentenceCard");
  const fb = document.createElement("div");
  fb.className = "sentence-feedback";
  fb.innerHTML = `
    ${userVal ? `<div class="your-answer">your answer: <span class="text">${escapeHtml(userVal)}</span></div>` : ""}
    <div class="correct-answer">
      <span class="hangul">${escapeHtml(currentSent.kr)}</span>
    </div>
    <div class="romaja">[${escapeHtml(currentSent.rom)}]</div>
    <div class="gloss">${escapeHtml(currentSent.en)}</div>
  `;
  card.appendChild(fb);

  // Replace actions with grade buttons
  card.querySelector(".actions").innerHTML = `
    <button class="btn grade-good" id="gotItBtn">✅ got it</button>
    <button class="btn grade-bad" id="missedBtn">❌ missed it</button>
  `;
  $("#gotItBtn").onclick = () => gradeSentence("right");
  $("#missedBtn").onclick = () => gradeSentence("wrong");
  $("#gotItBtn").focus();
}

function gradeSentence(result) {
  const s = sentStats[currentSent.kr] = sentStats[currentSent.kr] || { right: 0, wrong: 0 };
  if (result === "right") { s.right++; sentSession.correct++; sentSession.asked++; }
  else { s.wrong++; sentSession.asked++; }
  s.last = new Date().toISOString();
  saveSentStats();
  renderSentenceSessionBar();
  renderSentence();
}

function renderSentenceSessionBar() {
  const bar = $("#sentenceSessionBar");
  if (!sentSession.asked) { bar.innerHTML = ""; return; }
  const pct = Math.round(100 * sentSession.correct / sentSession.asked);
  bar.innerHTML = `session: <strong>${sentSession.correct}/${sentSession.asked}</strong> (${pct}%) <button class="reset" id="newSentSession">new session</button>`;
  $("#newSentSession").onclick = () => { sentSession = { asked: 0, correct: 0 }; renderSentenceSessionBar(); };
}

function bindSentenceControls() {
  document.querySelectorAll("[data-sdir]").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll("[data-sdir]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      sentDir = btn.dataset.sdir;
      renderSentence();
    };
  });
}

// ===== READING =====
function renderTextList() {
  $("#textViewer").hidden = true;
  $("#textList").hidden = false;
  $("#textList").innerHTML = TEXTS.map(t => `
    <div class="text-item" data-id="${t.id}">
      <div class="title-kr">${escapeHtml(t.title_kr)}</div>
      <div class="title-en">${escapeHtml(t.title_en)}</div>
      <div class="preview">${escapeHtml(t.kr.slice(0, 60))}…</div>
    </div>
  `).join("");
  document.querySelectorAll(".text-item").forEach(el => {
    el.onclick = () => openText(el.dataset.id);
  });
}

function openText(id) {
  const t = TEXTS.find(x => x.id === id);
  if (!t) return;
  $("#textList").hidden = true;
  const v = $("#textViewer");
  v.hidden = false;

  // Build clickable Korean: highlight glossary entries
  const glossMap = {};
  t.glossary.forEach(g => { glossMap[g.kr] = g; });
  let bodyHtml = escapeHtml(t.kr);
  // Replace each glossary term with a span (longest first to avoid overlaps)
  const keys = Object.keys(glossMap).sort((a, b) => b.length - a.length);
  keys.forEach(k => {
    const escK = escapeHtml(k);
    const re = new RegExp(escK.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g');
    bodyHtml = bodyHtml.replace(re, `<span class="word has-gloss" data-key="${escK.replace(/"/g, '&quot;')}">${escK}</span>`);
  });

  v.innerHTML = `
    <div class="text-viewer">
      <button class="back" id="backBtn">← back to list</button>
      <h2>${escapeHtml(t.title_kr)}</h2>
      <div class="subtitle">${escapeHtml(t.title_en)}</div>
      <div class="text-body" id="textBody">${bodyHtml}</div>
      <div class="text-toggles">
        <button class="btn secondary" id="toggleEn">show English</button>
        <button class="btn secondary" id="toggleGloss">show glossary</button>
      </div>
      <div class="text-translation" id="enPanel" hidden>${escapeHtml(t.en)}</div>
      <div class="glossary" id="glossPanel" hidden>
        <h4>glossary</h4>
        ${t.glossary.map(g => `
          <div class="glossary-item">
            <span class="hangul">${escapeHtml(g.kr)}</span>
            <span class="romaja">[${escapeHtml(g.rom)}]</span>
            — ${escapeHtml(g.en)}
          </div>
        `).join("")}
      </div>
    </div>
  `;
  $("#backBtn").onclick = renderTextList;
  $("#toggleEn").onclick = () => {
    const p = $("#enPanel");
    p.hidden = !p.hidden;
    $("#toggleEn").textContent = p.hidden ? "show English" : "hide English";
  };
  $("#toggleGloss").onclick = () => {
    const p = $("#glossPanel");
    p.hidden = !p.hidden;
    $("#toggleGloss").textContent = p.hidden ? "show glossary" : "hide glossary";
  };
  // Click on highlighted glossary words to reveal inline
  document.querySelectorAll("#textBody .word.has-gloss").forEach(el => {
    el.onclick = () => {
      const g = glossMap[el.dataset.key];
      if (!g) return;
      el.classList.toggle("revealed");
      let tip = el.querySelector(".tip");
      if (tip) { tip.remove(); return; }
      const span = document.createElement("span");
      span.className = "tip";
      span.style.cssText = "font-family:Inter;font-size:13px;color:var(--accent);margin-left:4px;";
      span.textContent = `(${g.en})`;
      el.appendChild(span);
    };
  });
}

bindTabs();
bindSentenceControls();
fillSelectors();
bindControls();
renderStats();
renderCard();
renderSessionBar();
</script>
</body>
</html>
